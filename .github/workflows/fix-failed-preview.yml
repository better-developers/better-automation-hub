# .github/workflows/fix-failed-preview.yml
name: Auto-fix Failed Coolify Preview

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  watch-and-fix:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Wait for Coolify deployment result
        id: coolify
        env:
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}
          COOLIFY_BASE_URL: ${{ secrets.COOLIFY_BASE_URL }}
          COOLIFY_APP_UUID: ${{ secrets.COOLIFY_APP_UUID }}
          COMMIT_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          echo "Polling for deployment of commit $COMMIT_SHA..."

          for i in $(seq 1 30); do
            sleep 20

            DEPLOYMENTS=$(curl -s \
              -H "Authorization: Bearer $COOLIFY_TOKEN" \
              "$COOLIFY_BASE_URL/api/v1/applications/$COOLIFY_APP_UUID/deployments?per_page=10")

            # Find deployment matching our commit SHA
            STATUS=$(echo "$DEPLOYMENTS" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          deployments = data.get('data', data) if isinstance(data, dict) else data
          for d in deployments:
              if d.get('commit') == '$COMMIT_SHA' or d.get('git_commit_sha') == '$COMMIT_SHA':
                  print(d.get('status', ''))
                  import os; f = open('/tmp/deployment_id.txt','w'); f.write(str(d.get('id',''))); f.close()
                  break
          ")

            echo "Attempt $i: status=$STATUS"

            if [ "$STATUS" = "finished" ]; then
              echo "result=success" >> $GITHUB_OUTPUT
              exit 0
            elif [ "$STATUS" = "failed" ] || [ "$STATUS" = "error" ]; then
              echo "result=failed" >> $GITHUB_OUTPUT
              DEPLOY_ID=$(cat /tmp/deployment_id.txt)
              echo "deployment_id=$DEPLOY_ID" >> $GITHUB_OUTPUT
              exit 0
            fi
          done

          echo "result=timeout" >> $GITHUB_OUTPUT

      - name: Fetch failure logs
        if: steps.coolify.outputs.result == 'failed'
        id: logs
        env:
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}
          COOLIFY_BASE_URL: ${{ secrets.COOLIFY_BASE_URL }}
        run: |
          DEPLOY_ID=$(cat /tmp/deployment_id.txt)
          curl -s \
            -H "Authorization: Bearer $COOLIFY_TOKEN" \
            "$COOLIFY_BASE_URL/api/v1/deployments/$DEPLOY_ID" \
            | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          logs = d.get('logs') or d.get('log') or str(d)
          with open('/tmp/deploy_logs.txt','w') as f:
              f.write(logs[-12000:])
          print('Logs saved')
          "

      - name: Run Claude fix
        if: steps.coolify.outputs.result == 'failed'
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          pip install anthropic -q
          python3 .github/scripts/claude_fix.py \
            --pr "${{ github.event.pull_request.number }}" \
            --branch "${{ github.head_ref }}"

      - name: Commit fix
        if: steps.coolify.outputs.result == 'failed'
        run: |
          git config user.name "claude-bot"
          git config user.email "claude-bot@users.noreply.github.com"
          git add -A
          git diff --staged --quiet && echo "No changes to commit" && exit 0
          git commit -m "fix: auto-fix failed preview deployment [skip coolify-fix]"
          git push origin ${{ github.head_ref }}

      - name: Comment on PR
        if: steps.coolify.outputs.result == 'failed'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const analysis = fs.existsSync('/tmp/claude_analysis.txt')
              ? fs.readFileSync('/tmp/claude_analysis.txt', 'utf8')
              : 'Fix applied.';
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ github.event.pull_request.number }},
              body: `## 🤖 Claude Auto-fix\n\n${analysis}`
            });
